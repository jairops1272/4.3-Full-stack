<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ContactosApp - Versión Final</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f5f5f5; padding: 20px; }
    .container { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    table { margin-top: 20px; }
    th { background: #007bff; color: white; }
    .loading { text-align: center; padding: 50px; }
    .avatar-circle { width: 40px; height: 40px; background: #0d6efd; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 10px; }
  </style>
</head>
<body>
<div class="container">
  <h1 class="text-center my-4">📇 ContactosApp</h1>
  <p class="text-center text-muted">CRUD completo - API REST con MySQL</p>
  
  <div class="row mb-3">
    <div class="col">
      <button id="btnReload" class="btn btn-primary">🔄 Recargar</button>
      <button id="btnNew" class="btn btn-success">➕ Nuevo Contacto</button>
    </div>
    <div class="col">
      <input type="text" id="searchInput" class="form-control" placeholder="🔍 Buscar contacto...">
    </div>
  </div>
  
  <div class="table-responsive">
    <table class="table table-bordered table-hover">
      <thead>
        <tr>
          <th>Contacto</th>
          <th>Email</th>
          <th>Teléfono</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="contactosTable">
        <tr><td colspan="4" class="loading">Cargando contactos...</td</tr>
      </tbody>
    64able
  </div>
  
  <div id="totalContactos" class="text-center text-muted mt-3"></div>
</div>

<script>
  const API_URL = 'https://contactos-app.jairopineda.io';
  
  async function cargarContactos() {
    const tbody = document.getElementById('contactosTable');
    tbody.innerHTML = '<tr><td colspan="4" class="loading">Cargando...</td></tr>';
    
    try {
      // Endpoint correcto para la API de tu amigo
      const response = await fetch(`${API_URL}/?action=contactos`);
      const data = await response.json();
      console.log('Respuesta:', data);
      
      if (data.success && data.data && data.data.length > 0) {
        let html = '';
        for (const c of data.data) {
          html += `
            <tr id="fila-${c.id_contacto}">
              <td>
                <div class="d-flex align-items-center">
                  <div class="avatar-circle">${(c.nombre?.charAt(0) || '?')}${(c.apellido?.charAt(0) || '')}</div>
                  <div>
                    <strong>${c.nombre || ''} ${c.apellido || ''}</strong><br>
                    <small class="text-muted">${c.nombre_categoria || 'Sin categoría'}</small>
                  </div>
                </div>
              </td>
              <td>${c.email_principal || '—'}</td>
              <td>${c.telefono_principal || '—'}</td>
              <td>
                <button class="btn btn-sm btn-warning me-1" onclick='editarContacto(${c.id_contacto})'>✏️ Editar</button>
                <button class="btn btn-sm btn-danger" onclick="eliminarContacto(${c.id_contacto})">🗑️ Eliminar</button>
              </td>
            </tr>
          `;
        }
        tbody.innerHTML = html;
        document.getElementById('totalContactos').innerHTML = `Total: ${data.data.length} contactos`;
        console.log('✅ Tabla actualizada');
      } else {
        tbody.innerHTML = '<tr><td colspan="4">No hay contactos disponibles</td></tr>';
      }
    } catch (error) {
      console.error('Error:', error);
      tbody.innerHTML = `<tr><td colspan="4">Error: ${error.message}</td></tr>`;
    }
  }
  
  async function editarContacto(id) {
    // Obtener datos actuales
    const res = await fetch(`${API_URL}/?action=contactos`);
    const data = await res.json();
    const contacto = data.data.find(c => c.id_contacto === id);
    
    if (contacto) {
      const nombre = prompt('Nuevo nombre:', contacto.nombre);
      const apellido = prompt('Nuevo apellido:', contacto.apellido);
      const email = prompt('Nuevo email:', contacto.email_principal);
      const telefono = prompt('Nuevo teléfono:', contacto.telefono_principal);
      
      if (nombre && apellido) {
        try {
          const response = await fetch(`${API_URL}/?action=actualizar`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              id_contacto: id,
              nombre: nombre,
              apellido: apellido,
              correo: email,
              telefono: telefono,
              id_categoria: contacto.id_categoria || 1
            })
          });
          const result = await response.json();
          if (result.success) {
            alert('Contacto actualizado');
            cargarContactos();
          } else {
            alert('Error: ' + result.message);
          }
        } catch (error) {
          alert('Error de conexión');
        }
      }
    }
  }
  
  async function eliminarContacto(id) {
    if (confirm('¿Eliminar este contacto?')) {
      try {
        const response = await fetch(`${API_URL}/?action=eliminar&id=${id}`, {
          method: 'DELETE'
        });
        const result = await response.json();
        if (result.success) {
          alert('Contacto eliminado');
          cargarContactos();
        } else {
          alert('Error: ' + result.message);
        }
      } catch (error) {
        alert('Error de conexión');
      }
    }
  }
  
  async function agregarContacto() {
    const nombre = prompt('Nombre:');
    const apellido = prompt('Apellido:');
    const email = prompt('Email:');
    const telefono = prompt('Teléfono:');
    const categoria = prompt('ID de categoría (1-3):', '1');
    
    if (nombre && apellido && email && telefono) {
      try {
        const response = await fetch(`${API_URL}/?action=agregar`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nombre: nombre,
            apellido: apellido,
            correo: email,
            telefono: telefono,
            id_categoria: parseInt(categoria) || 1,
            fecha_nacimiento: null
          })
        });
        const result = await response.json();
        if (result.success) {
          alert('Contacto agregado');
          cargarContactos();
        } else {
          alert('Error: ' + result.message);
        }
      } catch (error) {
        alert('Error de conexión');
      }
    }
  }
  
  // Exponer funciones globalmente
  window.editarContacto = editarContacto;
  window.eliminarContacto = eliminarContacto;
  window.agregarContacto = agregarContacto;
  
  // Event listeners
  document.getElementById('btnReload').addEventListener('click', cargarContactos);
  document.getElementById('btnNew').addEventListener('click', agregarContacto);
  
  // Búsqueda
  document.getElementById('searchInput').addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    const rows = document.querySelectorAll('#contactosTable tr');
    rows.forEach(row => {
      const text = row.textContent.toLowerCase();
      row.style.display = text.includes(term) ? '' : 'none';
    });
  });
  
  // Iniciar
  cargarContactos();
</script>
</body>
</html>
