<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ContactosApp - Versión Simple</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f5f5f5; padding: 20px; }
    .container { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    table { margin-top: 20px; }
    th { background: #007bff; color: white; cursor: pointer; }
    .loading { text-align: center; padding: 50px; }
  </style>
</head>
<body>
<div class="container">
  <h1 class="text-center my-4">📇 ContactosApp</h1>
  <p class="text-center text-muted">CRUD completo conectado a API REST - MySQL Hostinger</p>
  
  <div class="row mb-3">
    <div class="col">
      <button id="btnReload" class="btn btn-primary">🔄 Recargar</button>
      <button id="btnNew" class="btn btn-success">➕ Nuevo Contacto</button>
    </div>
    <div class="col">
      <input type="text" id="searchInput" class="form-control" placeholder="🔍 Buscar contacto...">
    </div>
  </div>
  
  <div class="table-responsive">
    <table class="table table-bordered table-hover">
      <thead>
        <tr>
          <th>Contacto</th>
          <th>Email</th>
          <th>Teléfono</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="contactosTable">
        <tr><td colspan="4" class="loading">Cargando contactos...</td></tr>
      </tbody>
    </table>
  </div>
  
  <div id="totalContactos" class="text-center text-muted mt-3"></div>
</div>

<script>
  const API_URL = 'https://contactos-app.jairopineda.io';
  
  async function cargarContactos() {
    const tbody = document.getElementById('contactosTable');
    tbody.innerHTML = '<tr><td colspan="4" class="loading">Cargando...</td></tr>';
    
    try {
      console.log('🔵 Llamando a:', `${API_URL}/contactos`);
      const response = await fetch(`${API_URL}/contactos`);
      const data = await response.json();
      console.log('🟢 Respuesta:', data);
      
      if (data.success && data.data && data.data.length > 0) {
        let html = '';
        for (const c of data.data) {
          html += `
            <tr>
              <td><strong>${c.nombre || ''} ${c.apellido || ''}</strong></td>
              <td>${c.email || ''}</td>
              <td>${c.telefono || ''}</td>
              <td>
                <button class="btn btn-sm btn-warning me-1" onclick="editarContacto(${c.id})">✏️ Editar</button>
                <button class="btn btn-sm btn-danger" onclick="eliminarContacto(${c.id})">🗑️ Eliminar</button>
              </td>
            </tr>
          `;
        }
        tbody.innerHTML = html;
        document.getElementById('totalContactos').innerHTML = `Total: ${data.data.length} contactos`;
        console.log('✅ Tabla actualizada con', data.data.length, 'contactos');
      } else {
        tbody.innerHTML = '<tr><td colspan="4">No hay contactos disponibles</td></tr>';
      }
    } catch (error) {
      console.error('❌ Error:', error);
      tbody.innerHTML = `<tr><td colspan="4">Error: ${error.message}</td></tr>`;
    }
  }
  
  async function editarContacto(id) {
    try {
      const response = await fetch(`${API_URL}/contactos/${id}`);
      const data = await response.json();
      if (data.success && data.data) {
        const c = data.data;
        const nombre = prompt('Nuevo nombre:', c.nombre);
        const apellido = prompt('Nuevo apellido:', c.apellido);
        const email = prompt('Nuevo email:', c.email);
        const telefono = prompt('Nuevo teléfono:', c.telefono);
        
        if (nombre && apellido && email && telefono) {
          const updateResponse = await fetch(`${API_URL}/contactos/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nombre, apellido, email, telefono })
          });
          const result = await updateResponse.json();
          if (result.success) {
            alert('Contacto actualizado');
            cargarContactos();
          }
        }
      }
    } catch (error) {
      alert('Error al editar');
    }
  }
  
  async function eliminarContacto(id) {
    if (confirm('¿Eliminar este contacto?')) {
      try {
        const response = await fetch(`${API_URL}/contactos/${id}`, { method: 'DELETE' });
        const data = await response.json();
        if (data.success) {
          alert('Contacto eliminado');
          cargarContactos();
        }
      } catch (error) {
        alert('Error al eliminar');
      }
    }
  }
  
  window.editarContacto = editarContacto;
  window.eliminarContacto = eliminarContacto;
  
  document.getElementById('btnReload').addEventListener('click', cargarContactos);
  document.getElementById('btnNew').addEventListener('click', () => {
    const nombre = prompt('Nombre:');
    const apellido = prompt('Apellido:');
    const email = prompt('Email:');
    const telefono = prompt('Teléfono:');
    if (nombre && apellido && email && telefono) {
      fetch(`${API_URL}/contactos`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre, apellido, email, telefono })
      }).then(() => cargarContactos());
    }
  });
  
  document.getElementById('searchInput').addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    const rows = document.querySelectorAll('#contactosTable tr');
    rows.forEach(row => {
      const text = row.textContent.toLowerCase();
      row.style.display = text.includes(term) ? '' : 'none';
    });
  });
  
  cargarContactos();
</script>
</body>
</html>
